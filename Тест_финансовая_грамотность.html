<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест на финансовую грамотность</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --primary: #028090;
            --primary-dark: #016673;
            --accent: #02C39A;
            --dark: #1E2761;
            --light-bg: #F8F9FA;
            --text: #2C3E50;
            --text-light: #64748B;
            --white: #FFFFFF;
            --success: #10B981;
            --warning: #F59E0B;
            --danger: #EF4444;
        }
        
        body {
            font-family: 'Manrope', -apple-system, sans-serif;
            background: linear-gradient(135deg, #F8F9FA 0%, #E8F5F7 100%);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            padding: 20px;
        }
        
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
        }
        
        .container {
            max-width: 800px;
            margin: 0 auto;
            animation: fadeIn 0.6s ease-out;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* ЗАГОЛОВОК */
        .header {
            text-align: center;
            margin-bottom: 50px;
            padding: 40px 20px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            border-radius: 24px;
            color: var(--white);
            box-shadow: 0 20px 60px rgba(2, 128, 144, 0.25);
            position: relative;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .header {
                margin-bottom: 20px;
                padding: 30px 20px;
                border-radius: 16px;
            }
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: pulse 4s ease-in-out infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.3; }
        }
        
        .header h1 {
            font-size: 2.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
        }
        
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.5rem;
                margin-bottom: 8px;
            }
        }
        
        .header p {
            font-size: 1.1rem;
            opacity: 0.95;
            position: relative;
            z-index: 1;
        }
        
        @media (max-width: 768px) {
            .header p {
                font-size: 0.95rem;
            }
        }
        
        /* ПРОГРЕСС БАР */
        .progress-container {
            margin-bottom: 40px;
            background: var(--white);
            padding: 20px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }
        
        @media (max-width: 768px) {
            .progress-container {
                margin-bottom: 15px;
                padding: 15px;
                border-radius: 12px;
            }
        }
        
        .progress-text {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-weight: 600;
            color: var(--text);
        }
        
        .progress-bar {
            width: 100%;
            height: 12px;
            background: #E5E7EB;
            border-radius: 20px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 20px;
            transition: width 0.5s ease;
            width: 0%;
        }
        
        /* ВОПРОСЫ */
        .question-card {
            background: var(--white);
            padding: 25px 20px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
            animation: slideIn 0.4s ease-out;
            display: none;
        }
        
        @media (max-width: 768px) {
            .question-card {
                padding: 20px 15px;
                border-radius: 16px;
                margin-bottom: 15px;
            }
        }
        
        .question-card.active {
            display: block;
        }
        
        @keyframes slideIn {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        
        .question-number {
            color: var(--accent);
            font-weight: 700;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
        }
        
        @media (max-width: 768px) {
            .question-number {
                font-size: 0.75rem;
                margin-bottom: 8px;
            }
        }
        
        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            color: var(--dark);
            margin-bottom: 20px;
            line-height: 1.3;
        }
        
        @media (max-width: 768px) {
            .question-text {
                font-size: 1.05rem;
                margin-bottom: 15px;
                line-height: 1.25;
            }
        }
        
        .answers {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        @media (max-width: 768px) {
            .answers {
                gap: 8px;
            }
        }
        
        .answer-option {
            background: var(--light-bg);
            padding: 14px 18px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 2px solid transparent;
            position: relative;
            overflow: hidden;
        }
        
        @media (max-width: 768px) {
            .answer-option {
                padding: 12px 14px;
                border-radius: 8px;
            }
        }
        
        .answer-option::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            transition: width 0.3s ease;
            opacity: 0.1;
        }
        
        .answer-option:hover {
            background: #EFF6FF;
            border-color: var(--primary);
            transform: translateX(4px);
        }
        
        .answer-option:hover::before {
            width: 100%;
        }
        
        .answer-option.selected {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-color: var(--primary);
            color: var(--white);
            font-weight: 600;
            transform: translateX(4px);
        }
        
        .answer-text {
            position: relative;
            z-index: 1;
            font-size: 0.95rem;
        }
        
        @media (max-width: 768px) {
            .answer-text {
                font-size: 0.85rem;
            }
        }
        
        .answer-points {
            font-size: 0.75rem;
            opacity: 0.7;
            margin-left: 6px;
        }
        
        @media (max-width: 768px) {
            .answer-points {
                font-size: 0.7rem;
            }
        }
        
        /* НАВИГАЦИЯ */
        .navigation {
            display: flex;
            justify-content: space-between;
            gap: 20px;
            margin-top: 40px;
        }
        
        @media (max-width: 768px) {
            .navigation {
                margin-top: 20px;
                gap: 10px;
            }
        }
        
        .btn {
            padding: 16px 40px;
            border: none;
            border-radius: 12px;
            font-size: 1.05rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Manrope', sans-serif;
        }
        
        @media (max-width: 768px) {
            .btn {
                padding: 12px 24px;
                font-size: 0.9rem;
            }
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--white);
            box-shadow: 0 8px 20px rgba(2, 128, 144, 0.3);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(2, 128, 144, 0.4);
        }
        
        .btn-secondary {
            background: var(--white);
            color: var(--primary);
            border: 2px solid var(--primary);
        }
        
        .btn-secondary:hover {
            background: var(--light-bg);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* РЕЗУЛЬТАТЫ */
        .results {
            display: none;
            animation: fadeIn 0.8s ease-out;
        }
        
        .results.active {
            display: block;
        }
        
        .score-card {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            padding: 50px 40px;
            border-radius: 24px;
            text-align: center;
            margin-bottom: 40px;
            color: var(--white);
            box-shadow: 0 20px 60px rgba(2, 128, 144, 0.3);
        }
        
        .score-number {
            font-size: 5rem;
            font-weight: 800;
            margin: 20px 0;
            text-shadow: 0 4px 20px rgba(0,0,0,0.2);
        }
        
        .score-label {
            font-size: 1.2rem;
            opacity: 0.9;
        }
        
        .level-badge {
            display: inline-block;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1.3rem;
            margin-top: 20px;
            background: rgba(255,255,255,0.2);
            backdrop-filter: blur(10px);
        }
        
        .result-section {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            margin-bottom: 30px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.08);
        }
        
        .result-section h2 {
            color: var(--dark);
            font-size: 1.8rem;
            margin-bottom: 20px;
        }
        
        .result-section h3 {
            color: var(--primary);
            font-size: 1.4rem;
            margin-top: 30px;
            margin-bottom: 15px;
        }
        
        .forecast-table {
            width: 100%;
            margin: 30px 0;
            border-collapse: collapse;
            background: var(--light-bg);
            border-radius: 12px;
            overflow: hidden;
        }
        
        .forecast-table th {
            background: var(--dark);
            color: var(--white);
            padding: 15px;
            text-align: left;
            font-weight: 700;
        }
        
        .forecast-table td {
            padding: 15px;
            border-bottom: 1px solid #E5E7EB;
        }
        
        .forecast-table tr:last-child td {
            border-bottom: none;
        }
        
        .highlight-box {
            background: linear-gradient(135deg, #FEF3C7 0%, #FDE68A 100%);
            border-left: 4px solid var(--warning);
            padding: 20px;
            border-radius: 12px;
            margin: 20px 0;
        }
        
        .highlight-box.success {
            background: linear-gradient(135deg, #D1FAE5 0%, #A7F3D0 100%);
            border-left-color: var(--success);
        }
        
        .highlight-box.danger {
            background: linear-gradient(135deg, #FEE2E2 0%, #FECACA 100%);
            border-left-color: var(--danger);
        }
        
        .action-list {
            list-style: none;
            padding-left: 0;
        }
        
        .action-list li {
            padding: 12px 0;
            padding-left: 35px;
            position: relative;
        }
        
        .action-list li::before {
            content: '✓';
            position: absolute;
            left: 0;
            color: var(--success);
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        .cta-box {
            background: linear-gradient(135deg, var(--dark) 0%, #2D3875 100%);
            color: var(--white);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            margin-top: 40px;
            box-shadow: 0 20px 60px rgba(30, 39, 97, 0.3);
        }
        
        .cta-box h3 {
            color: var(--white);
            font-size: 2rem;
            margin-bottom: 20px;
        }
        
        .cta-box p {
            font-size: 1.1rem;
            margin-bottom: 30px;
            opacity: 0.9;
        }
        
        .cta-btn {
            display: inline-block;
            padding: 18px 50px;
            background: var(--accent);
            color: var(--dark);
            text-decoration: none;
            border-radius: 12px;
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        .cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(2, 195, 154, 0.4);
        }
        
        /* АДАПТИВ */
        @media (max-width: 768px) {
            .header h1 {
                font-size: 1.8rem;
            }
            
            .question-card {
                padding: 30px 20px;
            }
            
            .question-text {
                font-size: 1.2rem;
            }
            
            .score-number {
                font-size: 3.5rem;
            }
            
            .result-section {
                padding: 25px 20px;
            }
            
            .navigation {
                flex-direction: column;
            }
            
            .btn {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ЗАГОЛОВОК -->
        <div class="header">
            <h1>Тест на финансовую грамотность</h1>
            <p>Узнайте свой уровень и прогноз финансового будущего за 10 минут</p>
        </div>
        
        <!-- ТЕСТ -->
        <div id="quiz-container">
            <!-- ПРОГРЕСС -->
            <div class="progress-container">
                <div class="progress-text">
                    <span>Вопрос <span id="current-question">1</span> из 20</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progress-fill"></div>
                </div>
            </div>
            
            <!-- ВОПРОСЫ (будут генерироваться JS) -->
            <div id="questions"></div>
            
            <!-- НАВИГАЦИЯ -->
            <div class="navigation">
                <button class="btn btn-secondary" id="prev-btn" onclick="prevQuestion()" style="display:none;">← Назад</button>
                <button class="btn btn-primary" id="next-btn" onclick="nextQuestion()" disabled>Далее →</button>
            </div>
        </div>
        
        <!-- РЕЗУЛЬТАТЫ -->
        <div id="results" class="results"></div>
    </div>

    <script>
        // ДАННЫЕ ТЕСТА
        const questions = [
            {
                text: "У вас есть финансовая подушка безопасности (деньги на 3-6 месяцев жизни)?",
                answers: [
                    { text: "Да, есть на 6+ месяцев", points: 3 },
                    { text: "Да, есть на 3-6 месяцев", points: 2 },
                    { text: "Есть немного (меньше 3 месяцев)", points: 1 },
                    { text: "Нет, живу от зарплаты до зарплаты", points: 0 }
                ]
            },
            {
                text: "Вы ведёте учёт личных доходов и расходов?",
                answers: [
                    { text: "Да, веду подробно каждый день/неделю", points: 3 },
                    { text: "Да, но иногда забываю", points: 2 },
                    { text: "Редко, когда вспомню", points: 1 },
                    { text: "Нет, не веду", points: 0 }
                ]
            },
            {
                text: "Вы знаете, сколько денег тратите в месяц на основные категории (еда, жильё, транспорт)?",
                answers: [
                    { text: "Да, знаю точные суммы", points: 3 },
                    { text: "Да, примерно представляю", points: 2 },
                    { text: "Смутно, не уверен", points: 1 },
                    { text: "Нет, не знаю", points: 0 }
                ]
            },
            {
                text: "У вас есть финансовые цели на год/5 лет?",
                answers: [
                    { text: "Да, записаны и есть план достижения", points: 3 },
                    { text: "Да, есть в голове", points: 2 },
                    { text: "Есть, но смутные", points: 1 },
                    { text: "Нет целей", points: 0 }
                ]
            },
            {
                text: "Вы откладываете деньги регулярно (хотя бы 10% дохода)?",
                answers: [
                    { text: "Да, каждый месяц автоматически", points: 3 },
                    { text: "Да, когда остаётся", points: 2 },
                    { text: "Редко получается", points: 1 },
                    { text: "Нет, не откладываю", points: 0 }
                ]
            },
            {
                text: "У вас есть кредиты или долги?",
                answers: [
                    { text: "Нет долгов", points: 3 },
                    { text: "Есть ипотека (плановый долг)", points: 2 },
                    { text: "Есть потребительские кредиты", points: 1 },
                    { text: "Есть долги и просрочки", points: 0 }
                ]
            },
            {
                text: "Вы инвестируете деньги (акции, облигации, недвижимость, бизнес)?",
                answers: [
                    { text: "Да, регулярно в разные инструменты", points: 3 },
                    { text: "Да, но нерегулярно или в одно", points: 2 },
                    { text: "Пробовал, но бросил", points: 1 },
                    { text: "Нет, не инвестирую", points: 0 }
                ]
            },
            {
                text: "Вы знаете разницу между активом и пассивом?",
                answers: [
                    { text: "Да, понимаю и применяю", points: 3 },
                    { text: "Да, слышал и примерно понимаю", points: 2 },
                    { text: "Слышал, но не уверен", points: 1 },
                    { text: "Нет, не знаю", points: 0 }
                ]
            },
            {
                text: "У вас есть страховки (жизнь, здоровье, имущество)?",
                answers: [
                    { text: "Да, несколько видов страховок", points: 3 },
                    { text: "Да, одна-две страховки", points: 2 },
                    { text: "Только обязательные (ОСАГО и тд)", points: 1 },
                    { text: "Нет страховок", points: 0 }
                ]
            },
            {
                text: "Вы понимаете, что такое инфляция и как она влияет на ваши деньги?",
                answers: [
                    { text: "Да, понимаю и учитываю", points: 3 },
                    { text: "Да, слышал и примерно понимаю", points: 2 },
                    { text: "Слышал, но не задумывался", points: 1 },
                    { text: "Нет, не знаю", points: 0 }
                ]
            },
            {
                text: "У вас есть пенсионный план (кроме государственной пенсии)?",
                answers: [
                    { text: "Да, откладываю на пенсию регулярно", points: 3 },
                    { text: "Да, есть НПФ или инвестиции", points: 2 },
                    { text: "Думаю об этом, но ничего не делаю", points: 1 },
                    { text: "Нет, надеюсь на государство", points: 0 }
                ]
            },
            {
                text: "Как вы принимаете крупные финансовые решения (покупка квартиры, машины)?",
                answers: [
                    { text: "Тщательно считаю, сравниваю варианты", points: 3 },
                    { text: "Прикидываю основное, потом решаю", points: 2 },
                    { text: "Принимаю эмоционально", points: 1 },
                    { text: "Импульсивно, как получится", points: 0 }
                ]
            },
            {
                text: "Вы читаете книги/статьи о финансах или проходите курсы?",
                answers: [
                    { text: "Да, регулярно учусь", points: 3 },
                    { text: "Да, иногда", points: 2 },
                    { text: "Редко, если попадётся", points: 1 },
                    { text: "Нет, не интересуюсь", points: 0 }
                ]
            },
            {
                text: "У вас есть несколько источников дохода?",
                answers: [
                    { text: "Да, 3+ источника дохода", points: 3 },
                    { text: "Да, 2 источника", points: 2 },
                    { text: "Один основной + подработки", points: 1 },
                    { text: "Один источник дохода", points: 0 }
                ]
            },
            {
                text: "Вы понимаете базовые налоги, которые платите?",
                answers: [
                    { text: "Да, знаю все свои налоги", points: 3 },
                    { text: "Да, основные понимаю", points: 2 },
                    { text: "Смутно представляю", points: 1 },
                    { text: "Нет, не знаю", points: 0 }
                ]
            },
            {
                text: "Как часто вы делаете импульсивные покупки?",
                answers: [
                    { text: "Почти никогда, всё планирую", points: 3 },
                    { text: "Редко, только мелочи", points: 2 },
                    { text: "Иногда, трачу больше чем планировал", points: 1 },
                    { text: "Часто, потом жалею", points: 0 }
                ]
            },
            {
                text: "У вас есть завещание или план передачи имущества?",
                answers: [
                    { text: "Да, всё оформлено", points: 3 },
                    { text: "Да, частично оформлено", points: 2 },
                    { text: "Думаю об этом", points: 1 },
                    { text: "Нет, не думал", points: 0 }
                ]
            },
            {
                text: "Вы работаете со страховой компанией (накопительное страхование жизни)?",
                answers: [
                    { text: "Да, есть полис накопительного страхования", points: 3 },
                    { text: "Да, рассматриваю варианты", points: 2 },
                    { text: "Слышал, но не интересовался", points: 1 },
                    { text: "Нет, не знаю что это", points: 0 }
                ]
            },
            {
                text: "Если завтра вам нужно срочно найти 100 000 тенге (или $500), вы сможете?",
                answers: [
                    { text: "Да, легко, есть в наличии", points: 3 },
                    { text: "Да, но придётся что-то продать/снять", points: 2 },
                    { text: "С трудом, нужно брать в долг", points: 1 },
                    { text: "Нет, негде взять", points: 0 }
                ]
            },
            {
